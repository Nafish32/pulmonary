# Full thesis-numbers run. fast_mode MUST be false here.
fast_mode: false
epochs: 50
imgsz: 640
fallback_imgsz: 512
batch: 12
png_size: 640
device: "0"     # single-GPU. Kaggle DDP ("0,1") is flaky and breaks checkpoint-resume -> keep "0".
detector_model_name: yolo26m.pt
calibration_enabled: true
uncertainty_enabled: true
robustness_enabled: true
